name: Profile Tests

on:
  push:
    branches: [development, main]
  pull_request:

jobs:
  static-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: latest

      - name: Run static + contract matrix
        run: make test-matrix INFRA_VERSION=development
