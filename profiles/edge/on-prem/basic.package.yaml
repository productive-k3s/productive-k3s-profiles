inputs:
  - name: ONPREM_SERVER_IP
    required: true
    sensitive: false
    source: local-override
    description: Server host or IP for the on-prem cluster
  - name: ONPREM_AGENT_IPS
    required: true
    sensitive: false
    source: local-override
    description: Space-separated list of agent hosts or IPs
  - name: ONPREM_SSH_KEY_PATH
    required: true
    sensitive: false
    source: local-override
    description: Local SSH private key path used to reach the nodes
